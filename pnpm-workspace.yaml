packages:
  - 'packages/*'
  - 'web-packages/*'
  - 'apps/*'

# Peer dependency behaviour (moved from .npmrc — pnpm 11 limits .npmrc to auth/registry only)
autoInstallPeers: true
strictPeerDependencies: false

# Supply-chain hardening
# 14-day quarantine on newly-published packages (minutes; 14d × 1440)
minimumReleaseAge: 20160
# pnpm 11.0.4 made ERR_PNPM_MISSING_TIME a hard error when registry metadata lacks the `time`
# field (pnpm/pnpm#11238, unfixed). Setting false restores pnpm 10 behaviour: missing-time
# packages are warned and skipped rather than failing the install.
minimumReleaseAgeStrict: false
# Exempt packages whose latest release is too new to satisfy the quarantine.
# The weekly `prune-release-age-exemptions` workflow auto-PRs removal of entries once aged.
#
# Format: - 'pkg'  # <version> — <reason>
# The version is required — the prune script uses it to decide when to remove the entry.
minimumReleaseAgeExclude:
  - '@uipath/*'       # permanent — own scope, always installable immediately
  - 'postcss'         # 8.5.14 — security override in pnpm.overrides
  - 'mermaid'         # 11.15.0 — GHSA-v2wj-7wpq-c8vv backport patch
  - 'next'                      # 16.2.6 — locked version too new
  - '@next/swc-darwin-arm64'   # 16.2.6 — co-published with next, optional platform binary
  - '@next/swc-darwin-x64'     # 16.2.6 — co-published with next, optional platform binary
  - '@next/swc-linux-arm64-gnu'  # 16.2.6 — co-published with next, optional platform binary
  - '@next/swc-linux-arm64-musl' # 16.2.6 — co-published with next, optional platform binary
  - '@next/swc-linux-x64-gnu'  # 16.2.6 — co-published with next, optional platform binary
  - '@next/swc-linux-x64-musl' # 16.2.6 — co-published with next, optional platform binary
  - '@next/swc-win32-arm64-msvc' # 16.2.6 — co-published with next, optional platform binary
  - '@next/swc-win32-x64-msvc' # 16.2.6 — co-published with next, optional platform binary
  - 'fs-extra'        # 11.3.5 — locked version too new
  - '@babel/parser'   # 7.29.3 — locked version too new
# Refuse transitive git/tarball deps (pnpm 11 default; kept explicit for clarity)
blockExoticSubdeps: true

# dompurify XSS - FIXME: no patch available yet
auditConfig:
  ignoreGhsas:
    - GHSA-v2wj-7wpq-c8vv

# pnpm 11: build scripts are blocked by default — explicitly allow legitimate native builds.
# These packages require postinstall scripts to download platform-specific binaries or compile native code.
allowBuilds:
  '@biomejs/biome': true   # downloads platform-specific binary
  '@parcel/watcher': true  # native file-system watcher
  core-js: true            # polyfill compilation
  es5-ext: true            # ES5 extension build
  esbuild: true            # downloads native binary
  msw: true                # service worker init
  sharp: true              # native image processing
