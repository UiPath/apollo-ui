packages:
  - 'packages/*'
  - 'web-packages/*'
  - 'apps/*'

# Peer dependency behaviour (moved from .npmrc — pnpm 11 limits .npmrc to auth/registry only)
autoInstallPeers: true
strictPeerDependencies: false

# Supply-chain hardening
# 14-day quarantine on newly-published packages (minutes; 14d × 1440)
minimumReleaseAge: 20160
# Exempt packages whose latest release is too new to satisfy the quarantine.
# The weekly `prune-release-age-exemptions` workflow auto-PRs removal of entries once aged.
#
# Format: - 'pkg'  # <version> — <reason>
# The version is required — the prune script uses it to decide when to remove the entry.
minimumReleaseAgeExclude:
  - '@uipath/*'                   # permanent — own scope, always installable immediately
  - '@turbo/*'                    # 2.9.14 — platform binaries co-published with turbo (scope rename from turbo-*), same OIDC provenance ✓
  - '@esbuild/*'                  # 0.28.1 — platform binaries co-published with esbuild in the same OIDC release, vetted 2026-06-16
  - '@shadcn/react'               # 0.2.1 — zero runtime deps (peer-only: react/@types/react >=19), GitHub Actions OIDC provenance (SLSA v1, consistent with 0.2.0), verified tag @shadcn/react@0.2.1, changelog + diff scoped to MessageScroller fixes, sha512 integrity ✓, vetted 2026-07-10
# Refuse transitive git/tarball deps (pnpm 11 default; kept explicit for clarity)
blockExoticSubdeps: true

# Dependency version overrides (moved from package.json#pnpm — pnpm 11 ignores that field, pnpm/pnpm#11536)
overrides:
  minimatch: "^10.2.5"
  lodash: "^4.18.1"
  tmp: "^0.2.6"
  picomatch: ">=4.0.4"
  postcss: "^8.5.14"
  hono: "^4.12.25"                      # GHSA-88fw-hqm2-52qc (high)/rv63/wwfh/j6c9/wgpf (moderate) — vetted 2026-06-16; transitive via @modelcontextprotocol/sdk + @hono/node-server (both pin ^4)
  dompurify: ">=3.4.11"                 # GHSA-vxr8-fq34-vvx9/gvmj/x4vx/rp9w/r47g/hpcv/76mc + GHSA-cmwh-pvxp-8882 (moderate, setConfig hook config leak; patched 3.4.11), vetted 2026-06-22
  js-yaml: ">=4.1.2"                   # GHSA-h67p-54hq-rp68 (moderate) — transitive via @commitlint/load>cosmiconfig
  markdown-it: ">=14.1.2"              # GHSA-6v5v-wf23-fmfq (moderate) — transitive via storybook toolchain
  "@babel/core": ">=7.29.1"            # GHSA-4x5r-pxfx-6jf8 (low) — transitive via storybook/babel transform
  rolldown: "1.0.1"                    # vite 8 dep-optimizer regression: rolldown 1.0.2/1.0.3 emit chunks that call cross-chunk init_*() without importing it -> "init_*_esm is not defined" at runtime (Storybook preview crash). Upstream still open (rolldown#9515 / vite#22583, both p1). 1.0.1 is the last good rolldown; keep vite 8.0.16 (security-patched) and pin rolldown back. Remove once fixed upstream.
  # Security pins (vetted 2026-06-16)
  esbuild: "^0.28.1"                    # GHSA-gv7w-rqvm-qjhr (high)/GHSA-g7r4-m6w7-qqqr (low) — Storybook 10.4.x widened its range (@storybook/csf-plugin@10.4.1 now allows esbuild ^0.28.1) and nothing in the tree still pins <0.28; override retained as defense-in-depth to pin the patched line
  "ws@>=8.0.0 <9": "^8.21.0"            # GHSA-96hv-2xvq-fx4p (high) — latest engine.io-client (6.6.5) still pins ws ~8.20.1; blocked upstream at Socket.IO
  "@opentelemetry/core": "^2.8.0"       # GHSA-8988-4f7v-96qf (moderate) — @uipath/core-telemetry pins sdk-logs ^0.204.0 which pins core/resources exactly 2.1.0; bump upstream to drop
  "@opentelemetry/resources": "^2.8.0"  # lockstep with core 2.8.0 (sdk-logs/resources pin core exactly at 2.1.0)

# packageExtensions (moved from package.json#pnpm for the same reason)
packageExtensions:
  "@tanstack/ai":
    dependencies:
      "@standard-schema/spec": "^1.1.0"

# pnpm 11: build scripts are blocked by default — explicitly allow legitimate native builds.
# These packages require postinstall scripts to download platform-specific binaries or compile native code.
allowBuilds:
  '@biomejs/biome': true   # downloads platform-specific binary
  '@parcel/watcher': true  # native file-system watcher
  core-js: true            # polyfill compilation
  es5-ext: true            # ES5 extension build
  esbuild: true            # downloads native binary
  msw: true                # service worker init
  sharp: true              # native image processing
