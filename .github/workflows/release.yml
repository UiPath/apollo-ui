name: Release

on:
  push:
    branches:
      - main
      - 'support/**'

# Deny-all default; the release job grants only what it needs.
permissions: {}

env:
  TURBO_TELEMETRY_DISABLED: 1
  DO_NOT_TRACK: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    name: Release and Publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Node dependencies
        uses: ./.github/actions/install-node-deps
        with:
          registry-token: ${{ secrets.GH_NPM_REGISTRY_TOKEN }}

      - name: Cache Turborepo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.ref_name }}-

      - name: Build packages
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Setup git user and credentials
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          git config --global user.name "semantic-release-bot"
          git config --global user.email "semantic-release-bot@users.noreply.github.com"
          # Inject write credentials only after build + test complete.
          # RELEASE_TOKEN is not in .git/config during pnpm build or pnpm test above.
          git remote set-url origin "https://x-access-token:${RELEASE_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          NPM_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
          GH_NPM_REGISTRY_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          HUSKY: 0
        run: pnpm release

      - name: Commit changelogs and package updates
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            # Get list of changed packages
            CHANGED_PACKAGES=$(git diff --name-only | grep 'packages/\|web-packages/' | cut -d'/' -f2 | sort -u | tr '\n' ', ' | sed 's/,$//')

            git add --all
            git commit -m "chore(release): version bump [skip ci]" -m "Packages: $CHANGED_PACKAGES"

            if ! git push; then
              echo "::error::Failed to push version bump commit"
              echo "This may indicate a conflict or permission issue"
              exit 1
            fi
            echo "✓ Pushed version bump commit"
          else
            echo "No changes to commit"
          fi
          # Remove write credentials — push is complete and later steps don't need them
          git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"

      - name: Generate per-package SBOMs
        run: |
          pnpm --filter @uipath/apollo-core  sbom --sbom-format cyclonedx --prod > "$RUNNER_TEMP/sbom-apollo-core.cyclonedx.json"
          pnpm --filter @uipath/apollo-react sbom --sbom-format cyclonedx --prod > "$RUNNER_TEMP/sbom-apollo-react.cyclonedx.json"
          pnpm --filter @uipath/apollo-wind  sbom --sbom-format cyclonedx --prod > "$RUNNER_TEMP/sbom-apollo-wind.cyclonedx.json"
          pnpm --filter '@uipath/ap-chat'    sbom --sbom-format cyclonedx --prod > "$RUNNER_TEMP/sbom-ap-chat.cyclonedx.json"

      - name: Attest SBOM — apollo-core
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: packages/apollo-core/dist
          sbom-path: ${{ runner.temp }}/sbom-apollo-core.cyclonedx.json

      - name: Attest SBOM — apollo-react
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: packages/apollo-react/dist
          sbom-path: ${{ runner.temp }}/sbom-apollo-react.cyclonedx.json

      - name: Attest SBOM — apollo-wind
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: packages/apollo-wind/dist
          sbom-path: ${{ runner.temp }}/sbom-apollo-wind.cyclonedx.json

      - name: Attest SBOM — ap-chat
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: web-packages/ap-chat/dist
          sbom-path: ${{ runner.temp }}/sbom-ap-chat.cyclonedx.json

      - name: Upload SBOMs as release artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-${{ github.sha }}
          path: ${{ runner.temp }}/sbom-*.cyclonedx.json
          retention-days: 90

      # Build provenance attestation — covers GHP consumers, who cannot use npm's --provenance
      # mechanism (npm.org-only). Verifiable against local dist files or extracted tarball contents:
      #   gh attestation verify ./extracted-dist-file --owner UiPath
      - name: Attest build provenance — apollo-core
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: packages/apollo-core/dist

      - name: Attest build provenance — apollo-react
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: packages/apollo-react/dist

      - name: Attest build provenance — apollo-wind
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: packages/apollo-wind/dist

      - name: Attest build provenance — ap-chat
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: web-packages/ap-chat/dist