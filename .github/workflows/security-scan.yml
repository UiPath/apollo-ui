name: Security Scan - Workflows

on:
  pull_request:
    branches:
      - main
      - 'support/**'
  push:
    branches:
      - main
      - 'support/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Deny-all default; jobs grant the minimum they need.
permissions: {}

jobs:
  zizmor:
    name: Zizmor Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false

      - name: Run Zizmor Security Scan
        uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
        with:
          advanced-security: true
          min-confidence: medium
          min-severity: medium
          persona: regular
        env:
          ZIZMOR_CONFIG: zizmor.yml

  actionlint:
    name: Actionlint Workflow Syntax Check
    runs-on: ubuntu-latest
    # github-pr-check reporter only surfaces results in PR context; skip on push.
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false

      - name: Run actionlint
        # Catches a different class of issues than zizmor (syntax, expression typos, shellcheck on run: blocks).
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          reporter: github-pr-check
          fail_on_error: true
