name: Coded App Preview Deployments

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
      - 'support/**'

# Deny-all default; jobs grant the minimum they need.
permissions: {}

env:
  TURBO_TELEMETRY_DISABLED: 1
  DO_NOT_TRACK: 1
  UIP_GO_VERSION: 0.3.0

concurrency:
  group: coded-app-preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  initialize-comment:
    name: Initialize Apollo Coded App Preview Comment
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Initialize PR comment
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const identifier = '<!-- apollo-coded-app-preview-comment -->';
            const timestamp = new Date().toLocaleString('en-US', {
              timeZone: 'America/Los_Angeles',
              year: 'numeric',
              month: 'short',
              day: '2-digit',
              hour: '2-digit',
              minute: '2-digit',
              second: '2-digit',
              hour12: true
            });
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const deployingLink = `[Deploying...](${runUrl})`;
            const logsLink = `[Logs](${runUrl})`;
            const projects = ['apollo-design', 'apollo-docs', 'apollo-landing', 'apollo-vertex'];
            const body = [
              identifier,
              'Apollo Coded App preview deployments are running.',
              '',
              '| Project | Status | Preview | Updated (PT) |',
              '|---------|--------|---------|--------------|',
              ...projects.map(project => `| ${project} | ${deployingLink} | ${logsLink} | ${timestamp} |`)
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(comment =>
              comment.body?.includes(identifier) &&
              comment.user?.type === 'Bot' &&
              ['github-actions[bot]', 'github-actions'].includes(comment.user?.login)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  deploy:
    name: Deploy ${{ matrix.label }}
    needs: initialize-comment
    if: ${{ !cancelled() && github.event.action != 'closed' && needs.initialize-comment.result == 'success' && github.event.pull_request.head.repo.fork == false }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      # One app per runner, in parallel. Keep going if one app fails so the
      # others still publish; each leg reports status via an artifact and the
      # job fails at the end if any leg failed.
      fail-fast: false
      matrix:
        include:
          - label: apollo-landing
          - label: apollo-docs
          - label: apollo-design
          - label: apollo-vertex
            # Live AI Chat: pass the runtime OAuth client so uip-go bakes the
            # platform-auth context in and registers this preview's redirect URI.
            platform_auth: true

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Node dependencies
        uses: ./.github/actions/install-node-deps

      - name: Restore Turborepo cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .turbo
          # Per-app key so parallel legs don't race to save one shared cache
          # (which would persist only the first/fastest app's task outputs).
          key: ${{ runner.os }}-turbo-${{ matrix.label }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ matrix.label }}-${{ github.ref_name }}-

      - name: Deploy Coded App preview with uip-go
        id: deploy
        env:
          GH_NPM_REGISTRY_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          APP_LABEL: ${{ matrix.label }}
          PLATFORM_AUTH: ${{ matrix.platform_auth == true }}
          UIPATH_BASE_URL: ${{ vars.UIPATH_BASE_URL || secrets.UIPATH_BASE_URL }}
          UIPATH_CLIENT_ID: ${{ vars.UIPATH_CLIENT_ID || secrets.UIPATH_CLIENT_ID }}
          UIPATH_CLIENT_SECRET: ${{ secrets.UIPATH_CLIENT_SECRET }}
          UIPATH_FOLDER_KEY: ${{ vars.UIPATH_FOLDER_KEY || secrets.UIPATH_FOLDER_KEY }}
          UIPATH_ORG_NAME: ${{ vars.UIPATH_ORG_NAME || secrets.UIPATH_ORG_NAME }}
          UIPATH_TENANT_NAME: ${{ vars.UIPATH_TENANT_NAME || secrets.UIPATH_TENANT_NAME }}
          UIPATH_CLIENT_SCOPE: ${{ vars.UIPATH_CLIENT_SCOPE || 'Apps Apps.Read Apps.Write OR.Folders.Read OR.Folders.Write OR.Execution' }}
        run: |
          set -euo pipefail

          required=(GH_NPM_REGISTRY_TOKEN UIPATH_BASE_URL UIPATH_CLIENT_ID UIPATH_CLIENT_SECRET UIPATH_FOLDER_KEY UIPATH_ORG_NAME UIPATH_TENANT_NAME UIP_GO_VERSION)
          missing=0
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is required for the ${APP_LABEL} Coded App preview deployment."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          short_sha="${GITHUB_SHA:0:7}"
          version="0.1.0-pr${PR_NUMBER}.${short_sha}.${GITHUB_RUN_ATTEMPT}"
          app_name="${APP_LABEL}-pr-${PR_NUMBER}"
          uip_go_npmrc="${RUNNER_TEMP}/uip-go.npmrc"
          uip_go_prefix="${RUNNER_TEMP}/uip-go"
          {
            printf '@uipath:registry=https://npm.pkg.github.com\n'
            printf '//npm.pkg.github.com/:_authToken=%s\n' "$GH_NPM_REGISTRY_TOKEN"
          } > "$uip_go_npmrc"
          NPM_CONFIG_USERCONFIG="$uip_go_npmrc" npm install --prefix "$uip_go_prefix" "@uipath/uip-go@${UIP_GO_VERSION}"
          UIP_GO="${uip_go_prefix}/node_modules/.bin/uip-go"

          derive_app_url() {
            APP_NAME="$1" node <<'NODE'
          const baseUrl = process.env.UIPATH_BASE_URL || '';
          const orgName = process.env.UIPATH_ORG_NAME || '';
          const appName = process.env.APP_NAME || '';

          let environment = '';
          try {
            const hostname = new URL(baseUrl).hostname;
            let inferred = hostname.replace(/\.uipath\.com$/, '');
            inferred = inferred.replace(/^api\./, '').replace(/\.api$/, '');
            environment = inferred && inferred !== 'api' && inferred !== 'cloud' ? inferred : '';
          } catch {
            environment = '';
          }

          const suffix = environment ? `.${environment}` : '';
          console.log(`https://${orgName}${suffix}.uipath.host/${appName}`);
          NODE
          }

          # The platform-auth app (vertex) carries its client id in the recipe
          # (first-party Uber.Client). Its Coded App host is pre-registered as a
          # redirect URI via a host wildcard in first-party-service-metadata, so
          # skip per-deployment redirect-URI registration.
          extra_args=()
          if [ "$PLATFORM_AUTH" = "true" ]; then
            extra_args+=(--no-aichat-redirects)
          fi

          output_file="$(mktemp)"
          echo "::group::uip-go ${APP_LABEL}"
          set +e
          "$UIP_GO" "$APP_LABEL" \
              --name "$app_name" \
              --path-name "$app_name" \
              --tags "apollo,${APP_LABEL},preview" \
              --version "$version" \
              --folder-key "$UIPATH_FOLDER_KEY" \
              --base-url "$UIPATH_BASE_URL" \
              --org-name "$UIPATH_ORG_NAME" \
              --tenant-name "$UIPATH_TENANT_NAME" \
              --deploy-retries 3 \
              --deploy-retry-delay-ms 10000 \
              "${extra_args[@]}" 2>&1 | tee "$output_file"
          command_exit=${PIPESTATUS[0]}
          set -e
          echo "::endgroup::"

          app_url="$(sed -nE 's/^[[:space:]]*App URL:[[:space:]]*//p' "$output_file" | tail -n 1)"
          if [ -z "$app_url" ] && [ "$command_exit" -eq 0 ]; then
            app_url="$(derive_app_url "$app_name")"
          fi
          if [ -n "$app_url" ]; then
            case "$app_url" in
              */) ;;
              *) app_url="${app_url}/" ;;
            esac
            echo "url=$app_url" >> "$GITHUB_OUTPUT"
          fi

          if [ "$command_exit" -ne 0 ]; then
            echo "::error::uip-go ${APP_LABEL} failed."
            exit "$command_exit"
          fi

      - name: Save Turborepo cache
        if: always()
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ matrix.label }}-${{ github.ref_name }}-${{ github.sha }}

      - name: Save deploy result
        if: always()
        env:
          APP_LABEL: ${{ matrix.label }}
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
        run: |
          mkdir -p "$RUNNER_TEMP/deploy-result"

          if [ "$DEPLOY_OUTCOME" = "success" ]; then
            outcome="success"
            error=""
          elif [ "$DEPLOY_OUTCOME" = "failure" ]; then
            outcome="failure"
            error="uip-go deploy failed for $APP_LABEL"
          else
            outcome="skipped"
            error=""
          fi

          printf '%s' "${DEPLOY_URL:-}" > "$RUNNER_TEMP/deploy-result/url"
          printf '%s' "$outcome"        > "$RUNNER_TEMP/deploy-result/outcome"
          printf '%s' "$error"          > "$RUNNER_TEMP/deploy-result/error"

      - name: Upload deploy result
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: deploy-result-${{ matrix.label }}
          path: ${{ runner.temp }}/deploy-result/
          retention-days: 1

  update-comment:
    name: Update Apollo Coded App Preview Comment
    needs: [initialize-comment, deploy]
    if: ${{ always() && github.event.action != 'closed' && github.event.pull_request.head.repo.fork == false && needs.initialize-comment.result != 'skipped' }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Download deploy results
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: deploy-result-*
          path: ${{ runner.temp }}/results

      - name: Update PR comment
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          RESULTS_DIR: ${{ runner.temp }}/results
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const identifier = '<!-- apollo-coded-app-preview-comment -->';
            const projects = ['apollo-design', 'apollo-docs', 'apollo-landing', 'apollo-vertex'];
            const resultsDir = process.env.RESULTS_DIR;
            const logsLink = `[Logs](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;
            const timestamp = new Date().toLocaleString('en-US', {
              timeZone: 'America/Los_Angeles',
              year: 'numeric',
              month: 'short',
              day: '2-digit',
              hour: '2-digit',
              minute: '2-digit',
              second: '2-digit',
              hour12: true
            });

            const readResult = (project) => {
              const dir = path.join(resultsDir, `deploy-result-${project}`);
              const read = (name) => {
                try {
                  return fs.readFileSync(path.join(dir, name), 'utf8').trim();
                } catch {
                  return '';
                }
              };
              return { url: read('url'), outcome: read('outcome') || 'skipped' };
            };

            let anyFailed = false;
            const rows = projects.map(project => {
              const { url, outcome } = readResult(project);
              const ready = outcome === 'success' && Boolean(url);
              if (outcome === 'failure') anyFailed = true;
              const status = ready ? 'Ready' : outcome === 'failure' ? 'Failed' : 'Skipped';
              const preview = ready ? `[Preview](${url}) · ${logsLink}` : logsLink;
              return `| ${project} | ${status} | ${preview} | ${timestamp} |`;
            });

            const body = [
              identifier,
              anyFailed
                ? 'Apollo Coded App preview deployments finished with failures.'
                : 'Apollo Coded App preview deployments are ready.',
              '',
              '| Project | Status | Preview | Updated (PT) |',
              '|---------|--------|---------|--------------|',
              ...rows
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(comment =>
              comment.body?.includes(identifier) &&
              comment.user?.type === 'Bot' &&
              ['github-actions[bot]', 'github-actions'].includes(comment.user?.login)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  cleanup-previews:
    name: Cleanup Apollo Coded App Previews
    if: github.event.action == 'closed' && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
          persist-credentials: false
          # The PR head, not the base: cleanup needs the recipes in the
          # branch's .uip-go.json. Same-repo PRs only (job is fork-gated),
          # and the deploy job already runs head code with these secrets.
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Remove Apollo Coded App previews
        env:
          GH_NPM_REGISTRY_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          UIPATH_BASE_URL: ${{ vars.UIPATH_BASE_URL || secrets.UIPATH_BASE_URL }}
          UIPATH_CLIENT_ID: ${{ vars.UIPATH_CLIENT_ID || secrets.UIPATH_CLIENT_ID }}
          UIPATH_CLIENT_SECRET: ${{ secrets.UIPATH_CLIENT_SECRET }}
          UIPATH_FOLDER_KEY: ${{ vars.UIPATH_FOLDER_KEY || secrets.UIPATH_FOLDER_KEY }}
          UIPATH_ORG_NAME: ${{ vars.UIPATH_ORG_NAME || secrets.UIPATH_ORG_NAME }}
          UIPATH_TENANT_NAME: ${{ vars.UIPATH_TENANT_NAME || secrets.UIPATH_TENANT_NAME }}
          UIPATH_CLIENT_SCOPE: ${{ vars.UIPATH_CLIENT_SCOPE || 'Apps Apps.Read Apps.Write OR.Folders.Read OR.Folders.Write OR.Execution' }}
        run: |
          set -euo pipefail

          missing=0
          for name in GH_NPM_REGISTRY_TOKEN UIPATH_BASE_URL UIPATH_CLIENT_ID UIPATH_CLIENT_SECRET UIPATH_FOLDER_KEY UIPATH_ORG_NAME UIPATH_TENANT_NAME UIP_GO_VERSION; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is required for Apollo Coded App preview cleanup."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          uip_go_npmrc="${RUNNER_TEMP}/uip-go.npmrc"
          uip_go_prefix="${RUNNER_TEMP}/uip-go"
          {
            printf '@uipath:registry=https://npm.pkg.github.com\n'
            printf '//npm.pkg.github.com/:_authToken=%s\n' "$GH_NPM_REGISTRY_TOKEN"
          } > "$uip_go_npmrc"
          NPM_CONFIG_USERCONFIG="$uip_go_npmrc" npm install --prefix "$uip_go_prefix" "@uipath/uip-go@${UIP_GO_VERSION}"
          UIP_GO="${uip_go_prefix}/node_modules/.bin/uip-go"

          # No redirect-URI cleanup: previews reuse the first-party Uber.Client,
          # whose Coded App host is covered by a static wildcard registration.
          for label in apollo-landing apollo-docs apollo-design apollo-vertex; do
            app_name="${label}-pr-${PR_NUMBER}"
            if ! "$UIP_GO" "$label" \
              --delete-app \
              --name "$app_name" \
              --path-name "$app_name" \
              --folder-key "$UIPATH_FOLDER_KEY" \
              --base-url "$UIPATH_BASE_URL" \
              --org-name "$UIPATH_ORG_NAME" \
              --tenant-name "$UIPATH_TENANT_NAME"; then
              echo "::warning::Could not delete Coded App ${app_name}. External App auth can publish/deploy/upgrade, but the Apps delete API may reject CI tokens."
            fi
          done
