name: Apollo Vertex Registry Check

on:
  pull_request:
    branches: [main]

concurrency:
  group: test-registry-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      has_vertex_changes: ${{ steps.check.outputs.has_vertex_changes }}
    steps:
      - name: Check for vertex changes
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          VERTEX_FILES=$(gh pr diff "$PR_URL" --name-only | grep -E '^(apps/apollo-vertex/|\.github/scripts/test-registry/|\.github/workflows/apollo-vertex-registry-check\.yml)' || true)
          if [ -n "$VERTEX_FILES" ]; then
            echo "has_vertex_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_vertex_changes=false" >> "$GITHUB_OUTPUT"
          fi

  prepare:
    name: Prepare
    needs: detect-changes
    if: needs.detect-changes.outputs.has_vertex_changes == 'true'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.result }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
          scope: "@uipath"
          cache: "pnpm"

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_NPM_REGISTRY_TOKEN }}
        run: pnpm install

      - name: Build registry
        run: pnpm --filter apollo-vertex registry:build

      - name: Generate matrix batches
        id: matrix
        run: |
          MATRIX=$(node -e '
            const registry = JSON.parse(require("fs").readFileSync("apps/apollo-vertex/registry.json", "utf-8"));
            const names = registry.items.map(i => i.name);
            const batchSize = 10;
            const batches = [];
            for (let i = 0; i < names.length; i += batchSize) {
              batches.push({
                batch_index: Math.floor(i / batchSize),
                components: names.slice(i, i + batchSize).join(",")
              });
            }
            console.log(JSON.stringify(batches));
          ')
          echo "result=${MATRIX}" >> "${GITHUB_OUTPUT}"

      - name: Create base shadcn app
        run: cd ${{ runner.temp }} && pnpx shadcn@latest init --preset a0 --template next --name minimal-app

      - name: Configure @uipath registry
        working-directory: ${{ runner.temp }}/minimal-app
        env:
          REGISTRY_URL: http://localhost:3000
        run: pnpx tsx ${{ github.workspace }}/.github/scripts/test-registry/configure-registry.ts

      - name: Copy locales into base app
        run: cp -r apps/apollo-vertex/locales ${{ runner.temp }}/minimal-app/locales

      - name: Remove node_modules from base app
        run: rm -rf ${{ runner.temp }}/minimal-app/node_modules

      - name: Upload base app
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: base-app
          path: ${{ runner.temp }}/minimal-app
          retention-days: 1

      - name: Upload registry files
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: registry-files
          path: apps/apollo-vertex/public/r/
          retention-days: 1

  test-components:
    name: Test batch ${{ matrix.batch_index }}
    needs: [detect-changes, prepare]
    if: needs.detect-changes.outputs.has_vertex_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          sparse-checkout: |
            .github/scripts/test-registry
            package.json
            pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
          scope: "@uipath"

      - name: Download base app
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: base-app
          path: ${{ runner.temp }}/base-app

      - name: Download registry files
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: registry-files
          path: ${{ runner.temp }}/serve-dir/r

      - name: Start registry server
        run: npx -y serve ${{ runner.temp }}/serve-dir -p 3000 &

      - name: Test registry components
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_NPM_REGISTRY_TOKEN }}
          COMPONENTS: ${{ matrix.components }}
          BASE_APP_PATH: ${{ runner.temp }}/base-app
        run: pnpx tsx ${{ github.workspace }}/.github/scripts/test-registry/test-registry.ts

  registry-check:
    name: Apollo Vertex Registry Check
    needs: [detect-changes, test-components]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.detect-changes.outputs.has_vertex_changes }}" != "true" ]; then
            echo "No relevant changes detected — skipping registry check"
            exit 0
          fi
          if [ "${{ needs.test-components.result }}" != "success" ]; then
            echo "Some registry component tests failed"
            exit 1
          fi
          echo "All registry component tests passed"
