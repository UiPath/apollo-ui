name: PR Checks

on:
  pull_request:
    branches:
      - main
      - 'support/**'

env:
  BASE_REF: ${{ github.event.pull_request.base.ref }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: ${{ matrix.check }}
    runs-on: ubuntu-latest
    # GH_NPM_REGISTRY_TOKEN is unavailable on fork PRs — skip rather than fail with 401.
    # To support external contributors, make @uipath/* packages publicly readable on GHP.
    if: github.event.pull_request.head.repo.fork == false
    strategy:
      fail-fast: false
      matrix:
        check:
          - Format
          - Lint
          - Lint CSS
          - Lint Deps
          - Check Dependency Consistency
          - Typecheck
          - Test Coverage
          - Build

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Node dependencies
        uses: ./.github/actions/install-node-deps
        with:
          registry-token: ${{ secrets.GH_NPM_REGISTRY_TOKEN }}

      - name: Cache Turborepo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.ref_name }}-

      - name: Run Format Check
        if: matrix.check == 'Format'
        run: pnpm format:check --affected

      - name: Run Lint
        if: matrix.check == 'Lint'
        run: pnpm lint --affected

      - name: Run Lint CSS
        if: matrix.check == 'Lint CSS'
        run: pnpm lint:css --affected

      - name: Run Lint Deps
        if: matrix.check == 'Lint Deps'
        run: pnpm lint:deps --affected

      - name: Run Check Dependency Consistency
        if: matrix.check == 'Check Dependency Consistency'
        run: |
          if [[ "$BASE_REF" == support/* ]]; then
            echo "Support branch detected - ignoring locked workspace deps"
            pnpm exec check-dependency-version-consistency . --ignore-dep-pattern "^@uipath/"
          else
            pnpm check:dependencies
          fi

      - name: Run Typecheck
        if: matrix.check == 'Typecheck'
        run: pnpm typecheck --affected

      - name: Run Test Coverage
        if: matrix.check == 'Test Coverage'
        run: pnpm test:coverage --affected

      - name: Upload Coverage
        if: matrix.check == 'Test Coverage'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

      - name: Run Build
        if: matrix.check == 'Build'
        run: |
          if git diff --name-only "origin/${BASE_REF}...HEAD" | grep -qE '^(pnpm-lock\.yaml|package\.json)$'; then
            echo "📦 Root dependency files changed - building all packages"
            pnpm build
          else
            echo "🎯 Building affected packages only"
            pnpm build --affected
          fi

      - name: Upload Failure Artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: failure-${{ matrix.check }}-${{ github.sha }}
          path: coverage/
          retention-days: 3

  detect-lockfile-changes:
    name: Detect Lockfile Changes
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.lockfile_check.outputs.changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check for lockfile changes
        id: lockfile_check
        run: |
          if git diff --name-only "origin/${BASE_REF}...HEAD" | grep -q '^pnpm-lock\.yaml$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  audit:
    name: ${{ matrix.check }}
    needs: detect-lockfile-changes
    if: needs.detect-lockfile-changes.outputs.changed == 'true' && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check:
          - Audit All Dependencies
          - Audit Production Dependencies
          - Audit Package Signatures

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Node dependencies
        uses: ./.github/actions/install-node-deps
        with:
          registry-token: ${{ secrets.GH_NPM_REGISTRY_TOKEN }}

      - name: Run Audit All Dependencies
        if: matrix.check == 'Audit All Dependencies'
        run: pnpm audit

      - name: Run Audit Production Dependencies
        if: matrix.check == 'Audit Production Dependencies'
        run: pnpm audit --prod

      - name: Audit Package Signatures
        if: matrix.check == 'Audit Package Signatures'
        run: npm audit signatures
