name: PR Checks

on:
  pull_request:
    branches:
      - main

env:
  GH_NPM_REGISTRY_TOKEN: ${{ secrets.GH_NPM_REGISTRY_TOKEN }}
  NPM_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: ${{ matrix.check }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check:
          - Format
          - Lint
          - Lint CSS
          - Lint Deps
          - Check Dependency Consistency
          - Typecheck
          - Test Coverage
          - Build

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Turborepo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Run Format Check
        if: matrix.check == 'Format'
        run: bun run format:check --affected

      - name: Run Lint
        if: matrix.check == 'Lint'
        run: bun run lint --affected

      - name: Run Lint CSS
        if: matrix.check == 'Lint CSS'
        run: bun run lint:css --affected

      - name: Run Lint Deps
        if: matrix.check == 'Lint Deps'
        run: bun run lint:deps --affected

      - name: Run Check Dependency Consistency
        if: matrix.check == 'Check Dependency Consistency'
        run: bun run check:dependencies

      - name: Run Typecheck
        if: matrix.check == 'Typecheck'
        run: bun run typecheck --affected

      - name: Run Test Coverage
        if: matrix.check == 'Test Coverage'
        run: bun run test:coverage --affected

      - name: Upload Coverage
        if: matrix.check == 'Test Coverage'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

      - name: Run Build
        if: matrix.check == 'Build'
        run: |
          if git diff --name-only origin/main...HEAD | grep -qE '^(bun\.lock|package\.json)$'; then
            echo "📦 Root dependency files changed - building all packages"
            bun run build
          else
            echo "🎯 Building affected packages only"
            bun run build --affected
          fi

      - name: Upload Failure Artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: failure-${{ matrix.check }}-${{ github.sha }}
          path: |
            coverage/
            dist/
            .turbo/
          retention-days: 3

  detect-lockfile-changes:
    name: Detect Lockfile Changes
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.lockfile_check.outputs.changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check for lockfile changes
        id: lockfile_check
        run: |
          if git diff --name-only origin/main...HEAD | grep -q '^bun\.lock$'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  audit:
    name: ${{ matrix.check }}
    needs: detect-lockfile-changes
    if: needs.detect-lockfile-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check:
          - Audit All Dependencies
          - Audit Production Dependencies

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate package-lock.json for audit
        run: |
          # npm doesn't understand workspace:* protocol - temporarily replace for lockfile generation
          find . -name 'package.json' -not -path '*/node_modules/*' -exec sed -i 's/"workspace:\*"/"*"/g' {} +
          npm i --package-lock-only --ignore-scripts
          git checkout -- '*/package.json' package.json

      - name: Run Audit All Dependencies
        if: matrix.check == 'Audit All Dependencies'
        run: npm audit

      - name: Run Audit Production Dependencies
        if: matrix.check == 'Audit Production Dependencies'
        run: npm audit --omit=dev
