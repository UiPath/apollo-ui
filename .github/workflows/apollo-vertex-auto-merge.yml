name: Apollo Vertex Auto Merge
on:
    pull_request:
        types:
            - opened
            - reopened
            - ready_for_review
            - synchronize
        branches: [main]
        paths:
            - "apps/apollo-vertex/**"

jobs:
    enable-auto-merge:
        permissions:
            contents: read
            pull-requests: write
        runs-on: ubuntu-latest

        steps:
            - name: Check for changes outside apollo-vertex
              id: scope
              env:
                  GH_TOKEN: ${{ secrets.AUTO_MERGE_TOKEN }}
                  GH_REPO: ${{ github.repository }}
                  PR_URL: ${{ github.event.pull_request.html_url }}
              run: |
                  FILES_OUTSIDE=$(gh pr diff "$PR_URL" --name-only | grep -v '^apps/apollo-vertex/' || true)
                  if [ -n "$FILES_OUTSIDE" ]; then
                    echo "vertex_only=false" >> "$GITHUB_OUTPUT"
                    echo "Skipping auto-merge — PR touches files outside apps/apollo-vertex/:"
                    echo "$FILES_OUTSIDE"
                  else
                    echo "vertex_only=true" >> "$GITHUB_OUTPUT"
                  fi

            - name: Enable auto-merge
              if: steps.scope.outputs.vertex_only == 'true'
              env:
                  GH_TOKEN: ${{ secrets.AUTO_MERGE_TOKEN }}
                  PR_URL: ${{ github.event.pull_request.html_url }}
              run: |
                  gh pr merge --auto --rebase "$PR_URL"
