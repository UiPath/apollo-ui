name: Apollo Vertex Auto Merge
on:
    pull_request:
        types:
            - opened
            - reopened
            - ready_for_review
            - synchronize
        branches: [main]
        paths:
            - "apps/apollo-vertex/**"

# Deny-all default; the enable-auto-merge job grants only what it needs.
permissions: {}

jobs:
    enable-auto-merge:
        # Never auto-merge a fork PR. Fork PRs require human review regardless of file scope —
        # the path-based check below cannot establish trust in the author's commits.
        if: github.event.pull_request.head.repo.fork == false
        permissions:
            contents: read
            pull-requests: write
        runs-on: ubuntu-latest

        steps:
            - name: Check for changes outside apollo-vertex
              id: scope
              env:
                  GH_TOKEN: ${{ github.token }}
                  GH_REPO: ${{ github.repository }}
                  PR_URL: ${{ github.event.pull_request.html_url }}
              run: |
                  FILES_OUTSIDE=$(gh pr diff "$PR_URL" --name-only | grep -v '^apps/apollo-vertex/' || true)
                  if [ -n "$FILES_OUTSIDE" ]; then
                    echo "vertex_only=false" >> "$GITHUB_OUTPUT"
                    echo "Skipping auto-merge — PR touches files outside apps/apollo-vertex/:"
                    echo "$FILES_OUTSIDE"
                  else
                    echo "vertex_only=true" >> "$GITHUB_OUTPUT"
                  fi

            - name: Generate GitHub App token
              if: steps.scope.outputs.vertex_only == 'true'
              uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
              id: app-token
              with:
                  client-id: ${{ vars.RELEASER_APP_CLIENT_ID }}
                  private-key: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}
                  owner: ${{ github.repository_owner }}
                  repositories: ${{ github.event.repository.name }}
                  permission-pull-requests: write

            - name: Enable auto-merge
              if: steps.scope.outputs.vertex_only == 'true'
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
                  PR_URL: ${{ github.event.pull_request.html_url }}
              run: |
                  gh pr merge --auto --rebase "$PR_URL"
