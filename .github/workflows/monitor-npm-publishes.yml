name: Monitor npm Publishes

on:
  schedule:
    - cron: '0 6 * * *' # Daily at 06:00 UTC
  workflow_dispatch:

# Deny-all default; the check job grants only what it needs.
permissions: {}

jobs:
  check:
    name: Verify @uipath/* npm versions match GitHub releases
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false

      - name: Check npm versions against GitHub releases
        id: audit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PACKAGES=(
            "@uipath/apollo-core"
            "@uipath/apollo-react"
            "@uipath/apollo-wind"
            "@uipath/ap-chat"
          )

          UNMATCHED=""
          FETCH_ERRORS=0

          for pkg in "${PACKAGES[@]}"; do
            # Fetch all active dist-tag versions (not just latest) so publishes under
            # beta/next/rc tags are also caught. Use if ! to capture non-zero exit before
            # bash -e can terminate the step (GitHub Actions runs scripts with set -e).
            if ! dist_tags=$(npm view "$pkg" dist-tags --json --registry https://registry.npmjs.org 2>/dev/null) \
                || [ -z "$dist_tags" ] || [ "$dist_tags" = "null" ]; then
              echo "::warning::Could not fetch dist-tags for $pkg — skipping (will not auto-close alerts)"
              FETCH_ERRORS=$((FETCH_ERRORS + 1))
              continue
            fi

            # Extract unique versions across all dist-tags (latest, beta, next, etc.)
            versions=$(echo "$dist_tags" | jq -r 'to_entries | map(.value) | unique[]')

            for version in $versions; do
              # Skip dev PR preview versions — must match the exact shape dev-publish.yml
              # produces: x.y.z-prNNN or x.y.z-prNNN.sha  (full semver, -pr immediately
              # after the patch segment, no other prerelease label before -pr).
              if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+-pr[0-9]+(\.[a-z0-9]+)?$ ]]; then
                continue
              fi

              tag="${pkg}@${version}"
              if gh release view "$tag" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
                echo "✓ $tag — GitHub release exists"
              else
                echo "::warning::$tag is on npm but has no matching GitHub release tag"
                UNMATCHED="${UNMATCHED}\n- \`${tag}\`"
              fi
            done
          done

          # Emit mismatch output first so the alert step fires even when some fetches
          # also failed; the fetch-error exit is deferred to a later step.
          if [ -n "$UNMATCHED" ]; then
            echo "unmatched=true" >> "$GITHUB_OUTPUT"
            DELIM="ALERT_$(openssl rand -hex 8)"
            {
              echo "packages<<${DELIM}"
              echo -e "$UNMATCHED"
              echo "${DELIM}"
            } >> "$GITHUB_OUTPUT"
          elif [ "$FETCH_ERRORS" -eq 0 ]; then
            echo "unmatched=false" >> "$GITHUB_OUTPUT"
            echo "All @uipath/* npm versions have matching GitHub releases."
          else
            # No mismatches found but some fetches failed — incomplete check.
            # Do not set unmatched=false; that would trigger auto-close.
            echo "unmatched=error" >> "$GITHUB_OUTPUT"
          fi
          echo "fetch_errors=$FETCH_ERRORS" >> "$GITHUB_OUTPUT"
          if [ "$FETCH_ERRORS" -gt 0 ]; then
            echo "::error::$FETCH_ERRORS package(s) could not be fetched from npm. Not auto-closing any existing alert."
          fi

      - name: Open or update alert issue
        if: steps.audit.outputs.unmatched == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UNMATCHED_PACKAGES: ${{ steps.audit.outputs.packages }}
        run: |
          MARKER="<!-- npm-publish-monitor -->"
          TODAY=$(date +%Y-%m-%d)

          BODY=$(cat << BODY_EOF
          ${MARKER}
          ## ⚠️ npm Publish Alert — ${TODAY}

          The following \`@uipath/*\` packages exist on npm but have **no matching GitHub release tag**. This may indicate an unauthorized publish.

          ${UNMATCHED_PACKAGES}

          ### Verification steps
          1. Check each package on https://www.npmjs.com/package/\`<pkg>\`
          2. Confirm the version matches an expected release on this repo
          3. Verify SLSA provenance: \`gh attestation verify npm:<pkg>@<version> --owner UiPath\`
          4. **If the publish is unauthorized:** immediately remove this repo's npm Trusted Publisher entry on the affected package(s) at https://www.npmjs.com/package/\`<pkg>\`/access, then revoke the GitHub App private key in org settings

          _Generated by the [Monitor npm Publishes]($GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/workflows/monitor-npm-publishes.yml) workflow._
          BODY_EOF
          )

          # Update existing open alert, or open a new one
          EXISTING=$(gh issue list --label "security" --state open --json number,body \
            --jq "[.[] | select(.body | contains(\"${MARKER}\")) | .number][0]" 2>/dev/null || echo "")

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            gh issue edit "$EXISTING" --body "$BODY"
            echo "Updated existing alert issue #${EXISTING}"
          else
            gh issue create \
              --title "⚠️ [npm-monitor] Unverified npm publish detected for @uipath/* packages" \
              --body "$BODY" \
              --label "security"
          fi

      - name: Close resolved alert issues
        if: steps.audit.outputs.unmatched == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MARKER="<!-- npm-publish-monitor -->"
          EXISTING=$(gh issue list --label "security" --state open --json number,body \
            --jq "[.[] | select(.body | contains(\"${MARKER}\")) | .number][0]" 2>/dev/null || echo "")

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            gh issue close "$EXISTING" \
              --comment "✅ All @uipath/* npm versions now have matching GitHub releases. Closing automatically."
            echo "Closed resolved alert issue #${EXISTING}"
          fi

      - name: Fail on fetch errors
        if: steps.audit.outputs.fetch_errors != '0'
        run: exit 1
