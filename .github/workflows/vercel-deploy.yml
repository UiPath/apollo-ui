name: Vercel Deployments

on:
  pull_request:
  push:
    branches: [main]

# Deny-all default; jobs grant the minimum they need.
permissions: {}

concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-deploy:
    name: Initialize Deployment Status
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
    permissions:
      pull-requests: write

    steps:
      - name: Post initial deployment status
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const identifier = '<!-- vercel-deployments-comment -->';
            const timestamp = new Date().toLocaleString('en-US', {
              timeZone: 'America/Los_Angeles',
              year: 'numeric',
              month: 'short',
              day: '2-digit',
              hour: '2-digit',
              minute: '2-digit',
              second: '2-digit',
              hour12: true
            });

            const projects = [
              'apollo-design',
              'apollo-docs',
              'apollo-landing',
              'apollo-vertex'
            ];

            const tableRows = projects.map(projectName => {
              const logsLink = `[Logs](https://github.com/${ context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;
              return `| ${projectName} | 🟡 Deploying... | ${logsLink} | ${timestamp} |`;
            }).join('\n');

            const comment = [
              identifier,
              '<!-- updated-packages:  -->',
              'The latest updates on your projects. Learn more about [Vercel for GitHub](https://vercel.com/docs/deployments/git).',
              '',
              '| Project | Deployment | Review | Updated (PT) |',
              '|---------|------------|--------|---------------|',
              tableRows
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(c => c.body?.includes(identifier));

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }

  deploy:
    name: Deploy ${{ matrix.project_name }}
    runs-on: ubuntu-latest
    needs: pre-deploy
    if: ${{ !cancelled() && (github.event_name == 'push' || (needs.pre-deploy.result == 'success' && github.event.pull_request.head.repo.fork == false)) }}
    permissions:
      contents: read
    strategy:
      # Let every project deploy attempt complete so the PR comment surfaces all outcomes;
      # a failure in one entry should not cancel the others, but should still fail the workflow.
      fail-fast: false
      matrix:
        include:
          - project_name: apollo-design
            vercel_project_id_secret: VERCEL_PROJECT_ID_CANVAS
            build_filter: storybook-app
            build_task: storybook:build
          - project_name: apollo-docs
            vercel_project_id_secret: VERCEL_PROJECT_ID_DOCS
            build_filter: apollo-docs
            build_task: build
          - project_name: apollo-landing
            vercel_project_id_secret: VERCEL_PROJECT_ID_LANDING
            build_filter: apollo-landing
            build_task: build
          - project_name: apollo-vertex
            vercel_project_id_secret: VERCEL_PROJECT_ID_VERTEX
            build_filter: apollo-vertex
            build_task: build

    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false

      - name: Install Node dependencies
        uses: ./.github/actions/install-node-deps

      - name: Restore Turborepo cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.ref_name }}-

      - name: Cache Vercel CLI
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-vercel-cli-53.4.0-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-vercel-cli-53.4.0-${{ github.ref_name }}-

      - name: Install Vercel CLI
        run: npm install -g vercel@53.4.0

      - name: Set deployment variables
        id: vars
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "prod_flag=" >> "$GITHUB_OUTPUT"
          else
            echo "prod_flag=--prod" >> "$GITHUB_OUTPUT"
          fi

      - name: Set Vercel Project ID
        id: set-project-id
        run: |
          case "${{ matrix.vercel_project_id_secret }}" in
            VERCEL_PROJECT_ID_CANVAS)
              echo "VERCEL_PROJECT_ID=${{ secrets.VERCEL_PROJECT_ID_CANVAS }}" >> "$GITHUB_ENV"
              ;;
            VERCEL_PROJECT_ID_DOCS)
              echo "VERCEL_PROJECT_ID=${{ secrets.VERCEL_PROJECT_ID_DOCS }}" >> "$GITHUB_ENV"
              ;;
            VERCEL_PROJECT_ID_LANDING)
              echo "VERCEL_PROJECT_ID=${{ secrets.VERCEL_PROJECT_ID_LANDING }}" >> "$GITHUB_ENV"
              ;;
            VERCEL_PROJECT_ID_UI_REACT)
              echo "VERCEL_PROJECT_ID=${{ secrets.VERCEL_PROJECT_ID_UI_REACT }}" >> "$GITHUB_ENV"
              ;;
            VERCEL_PROJECT_ID_VERTEX)
              echo "VERCEL_PROJECT_ID=${{ secrets.VERCEL_PROJECT_ID_VERTEX }}" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Error: Unknown vercel_project_id_secret value '${{ matrix.vercel_project_id_secret }}'. Please update the case statement in .github/workflows/vercel-deploy.yml." >&2
              exit 1
              ;;
          esac

      - name: Build project
        id: build
        run: pnpm turbo ${{ matrix.build_task }} --filter=${{ matrix.build_filter }}

      - name: Save Turborepo cache
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.ref_name }}-${{ github.sha }}

      - name: Build Vercel output
        id: vercel-build
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          PROD_FLAG: ${{ steps.vars.outputs.prod_flag }}
        run: |
          # Run from repo root — Vercel applies rootDirectory from project settings
          # to locate the app subdirectory. Using --cwd here would double the path
          # (e.g. apps/apollo-vertex/apps/apollo-vertex) because the dashboard
          # rootDirectory is applied on top of --cwd.
          VERCEL_ARGS=(build --yes)
          [[ -n "$PROD_FLAG" ]] && VERCEL_ARGS+=("$PROD_FLAG")
          vercel "${VERCEL_ARGS[@]}"

      - name: Deploy to Vercel
        id: deploy
        run: |
          ERROR_MSG=""
          DEPLOY_URL=""
          set +e
          # Run from repo root — same reasoning as vercel build above.
          # Vercel applies rootDirectory from project settings to locate
          # the .vercel/output/ directory created by the build step.
          # --archive=tgz: package the prebuilt output as a single tarball before
          # upload. Without it, each file in .vercel/output/ counts as a separate
          # upload against the 40k/day api-upload-paid quota — Storybook + shadcn
          # registries blow through that quickly across 5 projects × N PRs/day.
          VERCEL_ARGS=(deploy --prebuilt --archive=tgz --yes)
          [[ -n "$PROD_FLAG" ]] && VERCEL_ARGS+=("$PROD_FLAG")
          DEPLOY_OUTPUT=$(vercel "${VERCEL_ARGS[@]}" 2>&1)
          DEPLOY_EXIT_CODE=$?
          set -e

          for __secret in "$VERCEL_TOKEN" "$VERCEL_ORG_ID"; do
            if [ -n "$__secret" ]; then
              DEPLOY_OUTPUT="${DEPLOY_OUTPUT//$__secret/***}"
            fi
          done

          # Always echo the full vercel CLI output so the runner log is traceable
          # without having to download the deploy-result artifact. Collapsible so
          # successful runs stay tidy.
          echo "::group::vercel CLI output (exit $DEPLOY_EXIT_CODE)"
          printf '%s\n' "$DEPLOY_OUTPUT"
          echo "::endgroup::"

          if [ "$DEPLOY_EXIT_CODE" -eq 0 ]; then
            if [ "$PROD_FLAG" == "--prod" ]; then
              DEPLOY_URL="https://${{ matrix.project_name }}.vercel.app"
            else
              DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | grep -oP 'https://[^\s]+\.vercel\.app[^\s]*' | head -n 1)
              if [ -z "$DEPLOY_URL" ]; then
                DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | tail -n 1)
                echo "⚠️ Warning: URL extraction fallback used for ${{ matrix.project_name }}"
              fi
            fi
            {
              echo "url=$DEPLOY_URL"
              echo "error_message="
            } >> "$GITHUB_OUTPUT"
            echo "✅ Deployed ${{ matrix.project_name }} to $DEPLOY_URL" >> "$GITHUB_STEP_SUMMARY"
          else
            # Prefer the actual `Error: …` line over a blind `tail -n 5`, which
            # often grabs upload progress bars or Node stack-trace frames and
            # hides the root cause.
            ERROR_MSG=$(echo "$DEPLOY_OUTPUT" | grep -m1 -E '^Error: ' || true)
            if [ -z "$ERROR_MSG" ]; then
              ERROR_MSG=$(echo "$DEPLOY_OUTPUT" | tail -n 5 | tr '\n' ' ')
            fi
            if [ "${#ERROR_MSG}" -gt 500 ]; then
              ERROR_MSG="${ERROR_MSG:0:500}..."
            fi
            echo "error_message=$ERROR_MSG" >> "$GITHUB_OUTPUT"
            echo "❌ Failed to deploy ${{ matrix.project_name }}: $ERROR_MSG" >> "$GITHUB_STEP_SUMMARY"
            # Escape %, CR, LF before interpolating into a workflow command so a
            # malformed/hostile error string can't break the annotation or inject
            # a second `::workflow-command::` via an embedded newline. Order
            # matters: % must be escaped first, since later subs emit %.
            ERROR_ANNOTATION="${ERROR_MSG//%/%25}"
            ERROR_ANNOTATION="${ERROR_ANNOTATION//$'\r'/%0D}"
            ERROR_ANNOTATION="${ERROR_ANNOTATION//$'\n'/%0A}"
            echo "::error title=Vercel deploy failed for ${{ matrix.project_name }}::$ERROR_ANNOTATION"
            exit 1
          fi
        env:
          PROD_FLAG: ${{ steps.vars.outputs.prod_flag }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          CI: true
          NODE_ENV: production

      - name: Save deploy result
        if: always() && github.event_name == 'pull_request'
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          DEPLOY_ERROR: ${{ steps.deploy.outputs.error_message }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          VERCEL_BUILD_OUTCOME: ${{ steps.vercel-build.outcome }}
          PROJECT_NAME: ${{ matrix.project_name }}
        run: |
          mkdir -p "$RUNNER_TEMP/deploy-result"

          # Attribute the failure to the earliest step that broke so the PR
          # comment can show a meaningful status instead of a misleading
          # "Skipped" when build/prebuild dies before deploy ever runs.
          if [ "$DEPLOY_OUTCOME" = "success" ]; then
            OUTCOME="success"
            ERROR=""
          elif [ "$BUILD_OUTCOME" = "failure" ]; then
            OUTCOME="failure"
            ERROR="Build failed (pnpm turbo) for $PROJECT_NAME"
          elif [ "$VERCEL_BUILD_OUTCOME" = "failure" ]; then
            OUTCOME="failure"
            ERROR="Vercel build failed for $PROJECT_NAME"
          elif [ "$DEPLOY_OUTCOME" = "failure" ]; then
            OUTCOME="failure"
            ERROR="${DEPLOY_ERROR:-Deploy step failed}"
          else
            OUTCOME="skipped"
            ERROR=""
          fi

          printf '%s' "${DEPLOY_URL:-}" > "$RUNNER_TEMP/deploy-result/url"
          printf '%s' "$OUTCOME"        > "$RUNNER_TEMP/deploy-result/outcome"
          printf '%s' "$ERROR"          > "$RUNNER_TEMP/deploy-result/error"

      - name: Upload deploy result
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: deploy-result-${{ matrix.project_name }}
          path: ${{ runner.temp }}/deploy-result/
          retention-days: 1

  update-pr-comment:
    name: Update PR Comment
    needs: deploy
    if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Download deploy results
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: deploy-result-*
          path: ${{ runner.temp }}/results

      - name: Update PR comment
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          RESULTS_DIR: ${{ runner.temp }}/results
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const projects = [
              'apollo-design',
              'apollo-docs',
              'apollo-landing',
              'apollo-vertex'
            ];

            const resultsDir = process.env.RESULTS_DIR;
            const logsLink = `[Logs](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;
            const timestamp = new Date().toLocaleString('en-US', {
              timeZone: 'America/Los_Angeles',
              year: 'numeric',
              month: 'short',
              day: '2-digit',
              hour: '2-digit',
              minute: '2-digit',
              second: '2-digit',
              hour12: true
            });

            const truncateError = (msg, maxLength = 100) => {
              if (!msg || msg.length <= maxLength) return msg;
              const truncated = msg.substring(0, maxLength);
              const lastSpace = truncated.lastIndexOf(' ');
              return lastSpace > 0 ? truncated.substring(0, lastSpace) + '...' : truncated + '...';
            };

            const tableRows = projects.map(project => {
              const dir = path.join(resultsDir, `deploy-result-${project}`);
              let url = '', outcome = 'skipped', error = '';
              if (fs.existsSync(dir)) {
                url     = fs.readFileSync(path.join(dir, 'url'),     'utf8').trim();
                outcome = fs.readFileSync(path.join(dir, 'outcome'), 'utf8').trim();
                error   = fs.readFileSync(path.join(dir, 'error'),   'utf8').trim();
              }

              let status;
              if (outcome === 'success') {
                status = '🟢 Ready';
              } else if (outcome === 'failure') {
                status = error ? `❌ Failed: ${truncateError(error)}` : '❌ Failed';
              } else {
                status = '⚠️ Skipped';
              }

              const projectLink  = url ? `[${project}](${url})` : project;
              const previewLink  = url ? `[Preview](${url})` : 'N/A';
              return `| ${projectLink} | ${status} | ${previewLink}, ${logsLink} | ${timestamp} |`;
            }).join('\n');

            const identifier = '<!-- vercel-deployments-comment -->';
            const body = [
              identifier,
              `<!-- updated-packages: ${projects.join(', ')} -->`,
              'The latest updates on your projects. Learn more about [Vercel for GitHub](https://vercel.com/docs/deployments/git).',
              '',
              '| Project | Deployment | Review | Updated (PT) |',
              '|---------|------------|--------|---------------|',
              tableRows
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body?.includes(identifier));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
