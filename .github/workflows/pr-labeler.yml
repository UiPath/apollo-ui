name: PR Labeler

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Deny-all default; the label job grants only what it needs.
permissions: {}

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213 # v6.1.0
        with:
          sync-labels: true
